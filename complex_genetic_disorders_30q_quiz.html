<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Complex Genetic Disorders Quiz</title>
  <style>
    :root {
      --slate-900: #0f172a;
      --slate-800: #1e293b;
      --slate-700: #334155;
      --slate-200: #e2e8f0;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-500: #6b7280;
      --green-100: #dcfce7;
      --green-500: #22c55e;
      --green-700: #15803d;
      --red-100: #fee2e2;
      --red-500: #ef4444;
      --red-700: #b91c1c;
      --blue: #6fa8dc;
    }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--slate-900);
      color: #111827;
    }
    .container {
      padding: 24px;
      max-width: 896px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .progress-wrap { flex: 1; }
    .progress {
      display: flex;
      gap: 4px;
    }
    .segment {
      height: 8px;
      border-radius: 9999px;
      border: 0;
      cursor: pointer;
      flex: 1;
      min-width: 4px;
      background: var(--slate-700);
      transition: background 0.15s ease;
      padding: 0;
    }
    .segment.active { background: var(--slate-200); }
    .segment.answered { background: var(--blue); }
    .status {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .count {
      color: var(--slate-200);
      font-size: 14px;
      font-weight: 700;
    }
    .badges {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 12px;
      border-radius: 9999px;
      font-size: 14px;
      font-weight: 700;
    }
    .badge.red {
      background: rgba(127, 29, 29, 0.6);
      color: #fee2e2;
    }
    .badge.green {
      background: rgba(6, 78, 59, 0.6);
      color: #d1fae5;
    }
    .card {
      border: 1px solid var(--gray-200);
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.12);
      background: white;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .meta {
      display: flex;
      justify-content: space-between;
      color: var(--gray-500);
      font-size: 12px;
      gap: 12px;
    }
    .stem {
      font-weight: 700;
      margin: 4px 0 0;
      line-height: 1.45;
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 4px;
    }
    .option {
      width: 100%;
      text-align: left;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid var(--gray-200);
      background: var(--gray-50);
      cursor: pointer;
      line-height: 1.35;
      font-size: 15px;
    }
    .option:hover { background: var(--gray-100); }
    .option.correct {
      background: var(--green-100);
      border-color: var(--green-500);
    }
    .option.incorrect {
      background: var(--red-100);
      border-color: var(--red-500);
    }
    .explanation {
      margin-top: 4px;
      padding: 12px;
      border-radius: 10px;
      background: var(--gray-50);
      border: 1px solid var(--gray-200);
      font-size: 14px;
      line-height: 1.45;
      display: none;
    }
    .explanation.show { display: block; }
    .explanation p { margin: 0 0 8px; }
    .explanation p:last-child { margin-bottom: 0; }
    .green-text { color: var(--green-700); }
    .red-text { color: var(--red-700); }
    .option-explanations {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .nav {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
    }
    .nav button {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid var(--gray-200);
      background: white;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .nav button:hover { background: var(--gray-100); }
    .footer {
      color: var(--gray-500);
      font-size: 12px;
      min-height: 16px;
    }
    @media (max-width: 640px) {
      .container { padding: 14px; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .progress-wrap { width: 100%; }
      .status { width: 100%; justify-content: space-between; }
      .meta { flex-direction: column; }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="topbar">
      <div class="progress-wrap">
        <div class="progress" id="progress"></div>
      </div>
      <div class="status">
        <div class="count" id="count"></div>
        <div class="badges">
          <div class="badge red"><span>×</span><span id="wrongCount">0</span></div>
          <div class="badge green"><span>✓</span><span id="rightCount">0</span></div>
        </div>
      </div>
    </div>

    <section class="card">
      <div class="meta">
        <span id="questionNumber"></span>
        <span id="topic"></span>
      </div>
      <p class="stem" id="stem"></p>
      <div class="options" id="options"></div>
      <div class="explanation" id="explanation"></div>
      <div class="nav">
        <button id="prevBtn">Previous</button>
        <button id="nextBtn">Next</button>
      </div>
    </section>

    <p class="footer"></p>
  </main>

  <script>
    const questions = [
      {
            "id": 1,
            "stem": "A family has several members with the same chronic disorder, but one monozygotic twin is severely affected while the other has mild disease after different environmental exposures. Which inheritance pattern best explains this phenotype",
            "topic": "Complex inheritance",
            "options": {
                  "A": "Autosomal recessive single-enzyme defect",
                  "B": "Multifactorial inheritance from multiple genes plus environment",
                  "C": "Mitochondrial inheritance with homoplasmy",
                  "D": "X-linked recessive inheritance"
            },
            "correct": "B",
            "explanation": "Complex inheritance reflects multiple genetic factors plus environmental modifiers. It often shows familial aggregation, but discordance can occur because non-genetic factors modify disease severity.",
            "optionExplanations": {
                  "A": "AR enzyme defects usually show clearer Mendelian recurrence patterns, not broad modifier-dependent discordance.",
                  "B": "Correct. Familial aggregation with variable severity from environmental modifiers is the key pattern.",
                  "C": "Homoplasmy would imply all mitochondria carry the same genotype and would not explain this multifactorial pattern.",
                  "D": "X-linked recessive disease usually affects males more severely and follows sex-linked transmission."
            }
      },
      {
            "id": 2,
            "stem": "A cytogenetics lab stimulates peripheral blood lymphocytes, arrests them in metaphase, and stains chromosomes with Giemsa. A trainee asks what dark G-bands represent. Which answer is most accurate",

            "options": {
                  "A": "GC-rich euchromatin that is actively transcribed",

                  "D": "Regions of active ribosomal RNA transcription"
            },
            "correct": "B",
            "explanation": "Dark G-bands are AT-rich, gene-poor, condensed heterochromatin. Light G-bands are GC-rich, gene-rich, transcriptionally active euchromatin.",
            "optionExplanations": {
                  "A": "This describes light G-bands, not dark G-bands.",
                  "B": "Correct. Dark G-bands are AT-rich, condensed, and relatively gene-poor.",
                  "C": "Centromeric DNA is not the general definition of dark G-bands.",
                  "D": "Ribosomal RNA transcription is not what G-banding primarily identifies."
            }
      },
      {
            "id": 3,
            "stem": "A newborn has hypotonia, flat facial profile, epicanthal folds, and an atrioventricular septal defect. Later in life, the child is at increased risk for leukemia and early Alzheimer-type changes. Which chromosomal mechanism most commonly causes this condition",
            "topic": "Down syndrome",
            "options": {

                  "A": "Correct. Most Down syndrome cases are full trisomy 21.",
                  "B": "Paternal 15q11 loss causes Prader-Willi syndrome.",

                  "D": "Deletion of contiguous genes on chromosome 22"

            "correct": "C",
            "explanation": "A balanced Robertsonian translocation carrier can be phenotypically normal with 45 chromosomes. Translocation Down syndrome can occur when the child inherits extra chromosome 21q material, often involving 14;21 fusion.",
            "optionExplanations": {

                  "B": "Mitochondrial heteroplasmy explains variable mitochondrial disease severity.",
                  "C": "Correct. A balanced carrier can have an affected child with extra 21q material.",
                  "D": "22q deletion causes DiGeorge/velocardiofacial spectrum."

      },
      {
            "id": 5,

      {

      {

            "stem": "A boy has intellectual disability, long face, large everted ears, macro-orchidism, autism-spectrum features, and aggressive behavior. Testing shows more than 200 CGG repeats in FMR1. What mechanism causes the disease phenotype",

      {

            "stem": "A woman has 90 CGG repeats in FMR1 but does not have classic Fragile X syndrome. She later develops premature ovarian failure. Her father has tremor and ataxia. What best explains these findings",

            "explanation": "Fragile X premutation carriers have 55 to 200 repeats and do not have classic Fragile X. Premutation mRNA toxicity can cause Fragile X-associated tremor/ataxia syndrome and premature ovarian failure in carrier females.",

                  "C": "Paternal 15q11 loss causes Prader-Willi syndrome.",

            }
      },

            "stem": "A 42-year-old man develops progressive choreiform movements, irritability, psychiatric disturbance, and dementia. His father had similar symptoms at an older age. Which genetic feature most likely explains earlier onset in this patient",

      {

    let currentIndex = 0;
    const answers = {};

    const progressEl = document.getElementById("progress");
    const countEl = document.getElementById("count");
    const wrongCountEl = document.getElementById("wrongCount");
    const rightCountEl = document.getElementById("rightCount");
    const questionNumberEl = document.getElementById("questionNumber");
    const topicEl = document.getElementById("topic");
    const stemEl = document.getElementById("stem");
    const optionsEl = document.getElementById("options");
    const explanationEl = document.getElementById("explanation");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    function getScore() {
      let right = 0;
      let wrong = 0;
      Object.keys(answers).forEach((qid) => {
        const q = questions.find((item) => item.id === Number(qid));
        if (q && answers[qid] === q.correct) right += 1;
        if (q && answers[qid] !== q.correct) wrong += 1;
      });
      return { right, wrong };
    }

    function goToQuestion(index) {
      let newIndex = index;
      if (newIndex < 0) newIndex = questions.length - 1;
      if (newIndex >= questions.length) newIndex = 0;
      currentIndex = newIndex;
      render();
    }

    function selectAnswer(letter) {
      const q = questions[currentIndex];
      answers[q.id] = letter;
      render();
    }

    function renderProgress() {
      progressEl.innerHTML = "";
      questions.forEach((q, idx) => {
        const btn = document.createElement("button");
        btn.className = "segment";
        if (idx === currentIndex) btn.classList.add("active");
        else if (answers[q.id] !== undefined) btn.classList.add("answered");
        btn.setAttribute("aria-label", `Go to question ${idx + 1}`);
        btn.title = q.topic || `Question ${idx + 1}`;
        btn.addEventListener("click", () => goToQuestion(idx));
        progressEl.appendChild(btn);
      });
    }

    function render() {
      const q = questions[currentIndex];
      const selectedChoice = answers[q.id] !== undefined ? answers[q.id] : null;
      const showExplanation = selectedChoice !== null;
      const isCorrect = selectedChoice === q.correct;
      const score = getScore();

      renderProgress();
      countEl.textContent = `${currentIndex + 1} / ${questions.length}`;
      wrongCountEl.textContent = score.wrong;
      rightCountEl.textContent = score.right;
      questionNumberEl.textContent = `Question ${currentIndex + 1} of ${questions.length}`;
      topicEl.textContent = q.topic ? `Topic: ${q.topic}` : "";
      stemEl.textContent = q.stem + "?";

      optionsEl.innerHTML = "";
      Object.entries(q.options).forEach(([letter, text]) => {
        const btn = document.createElement("button");
        btn.className = "option";
        if (showExplanation && letter === q.correct) btn.classList.add("correct");
        else if (showExplanation && letter === selectedChoice && letter !== q.correct) btn.classList.add("incorrect");
        btn.innerHTML = `<strong>${letter}.</strong> ${text}`;
        btn.addEventListener("click", () => selectAnswer(letter));
        optionsEl.appendChild(btn);
      });

      if (showExplanation) {
        const optionDetails = Object.entries(q.optionExplanations)
          .map(([letter, text]) => `<p><strong>${letter}.</strong> ${text}</p>`)
          .join("");
        explanationEl.className = "explanation show";
        explanationEl.innerHTML = `
          <p><strong>Correct answer: ${q.correct}</strong> (${q.options[q.correct]})</p>
          <p class="${isCorrect ? "green-text" : "red-text"}">${isCorrect ? "Nice job. " : "Good attempt. "}${q.explanation}</p>
          <div class="option-explanations">
            <p><strong>Why each option is right or wrong:</strong></p>
            ${optionDetails}
          </div>
        `;
      } else {
        explanationEl.className = "explanation";
        explanationEl.innerHTML = "";
      }
    }

    prevBtn.addEventListener("click", () => goToQuestion(currentIndex - 1));
    nextBtn.addEventListener("click", () => goToQuestion(currentIndex + 1));

    render();
  </script>
