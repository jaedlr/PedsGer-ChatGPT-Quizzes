    let currentIndex = 0;
    const answers = {};

    function renderSegments() {
      const container = document.getElementById("segments");
      container.innerHTML = "";
      questions.forEach((q, idx) => {
        const btn = document.createElement("button");
        btn.className = "segment" + (idx === currentIndex ? " active" : "") + (answers[q.id] !== undefined && idx !== currentIndex ? " answered" : "");
        btn.title = q.topic || `Question ${idx + 1}`;
        btn.onclick = () => {
          currentIndex = idx;
          render();
        };
        container.appendChild(btn);
      });
    }

    function renderCounts() {
      let right = 0;
      let wrong = 0;
      Object.entries(answers).forEach(([qid, choice]) => {
        const q = questions.find(item => item.id === Number(qid));
        if (q && choice === q.correct) right++;
        if (q && choice !== q.correct) wrong++;
      });
      document.getElementById("rightCount").textContent = right;
      document.getElementById("wrongCount").textContent = wrong;
    }

    function selectAnswer(letter) {
      answers[questions[currentIndex].id] = letter;
      render();
    }

    function renderOptions(q) {
      const selected = answers[q.id];
      const show = selected !== undefined;
      const container = document.getElementById("options");
      container.innerHTML = "";
      Object.entries(q.options).forEach(([letter, text]) => {
        const btn = document.createElement("button");
        btn.className = "option";
        if (show && letter === q.correct) btn.className += " correct";
        else if (show && letter === selected && letter !== q.correct) btn.className += " incorrect";
        btn.onclick = () => selectAnswer(letter);
        btn.innerHTML = `<strong>${letter}.</strong> ${text}`;
        container.appendChild(btn);
      });
    }

    function renderExplanation(q) {
      const selected = answers[q.id];
      const el = document.getElementById("explanation");
      if (selected === undefined) {
        el.style.display = "none";
        el.innerHTML = "";
        return;
      }
      const isCorrect = selected === q.correct;
      const optionLines = Object.entries(q.optionExplanations || {})
        .map(([letter, text]) => `<p><strong>${letter}.</strong> ${text}</p>`)
        .join("");
      el.style.display = "block";
      el.innerHTML = `
        <p><strong>Correct answer: ${q.correct}</strong> (${q.options[q.correct]})</p>
        <p class="${isCorrect ? "correctText" : "incorrectText"}">${isCorrect ? "Nice job. " : "Good attempt. "}${q.explanation}</p>
        <div style="margin-top: 10px;">
          <p><strong>Why each option is right or wrong:</strong></p>
          ${optionLines}
        </div>
      `;
    }

    function render() {
      const q = questions[currentIndex];
      document.getElementById("progressText").textContent = `${currentIndex + 1} / ${questions.length}`;
      document.getElementById("questionNumber").textContent = `Question ${currentIndex + 1} of ${questions.length}`;
      document.getElementById("topic").textContent = q.topic ? `Topic: ${q.topic}` : "";
      document.getElementById("stem").textContent = q.stem + "?";
      renderSegments();
      renderCounts();
      renderOptions(q);
      renderExplanation(q);
    }

    function nextQuestion() {
      currentIndex = (currentIndex + 1) % questions.length;
      render();
    }

    function prevQuestion() {
      currentIndex = (currentIndex - 1 + questions.length) % questions.length;
      render();
    }

    render();
  </script>
